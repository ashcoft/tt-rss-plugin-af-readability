# This workflow helps you trigger a SonarCloud analysis of your code.
# Free for open source projects.
#
# Setup instructions:
# 1. Login to SonarCloud.io and import your GitHub repository
# 2. Set SONAR_PROJECT_KEY and SONAR_ORGANIZATION secrets in GitHub
# 3. Generate a SONAR_TOKEN and add it to your repository secrets

name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      projectKey:
        description: 'SonarCloud Project Key'
        required: true
        type: string
      organization:
        description: 'SonarCloud Organization'
        required: true
        type: string

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip if projectKey is not configured via workflow_dispatch
    if: |
      github.event.inputs.projectKey != '' && github.event.inputs.organization != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ github.event.inputs.projectKey }}
            -Dsonar.organization=${{ github.event.inputs.organization }}
            -Dsonar.sources=init.php,init.js
        continue-on-error: true
